<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" style="background:#1e1e2f; font-family:Inter,Arial,Helvetica,sans-serif;">
  <!-- Definitions for glass effect -->
  <defs>
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.7"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" in2="blur" mode="normal"/>
    </filter>
  </defs>

  <!-- ADMIN Card -->
  <g filter="url(#glass)">
    <rect x="350" y="30" width="200" height="80" rx="12" fill="rgba(255,215,0,0.15)" stroke="rgba(255,215,0,0.6)"/>
    <text x="450" y="70" fill="#ffd700" font-size="18" text-anchor="middle" dominant-baseline="middle">ADMIN</text>
    <text x="450" y="90" fill="#ffd700" font-size="12" text-anchor="middle" dominant-baseline="middle">id, username, role, last_login</text>
  </g>

  <!-- USER Card -->
  <g filter="url(#glass)">
    <rect x="100" y="180" width="200" height="100" rx="12" fill="rgba(0,255,255,0.15)" stroke="rgba(0,255,255,0.6)"/>
    <text x="200" y="210" fill="#00ffff" font-size="18" text-anchor="middle" dominant-baseline="middle">USER</text>
    <text x="200" y="230" fill="#00ffff" font-size="12" text-anchor="middle" dominant-baseline="middle">id, role, company_name, is_verified, trust_score</text>
  </g>

  <!-- PROJECT Card -->
  <g filter="url(#glass)">
    <rect x="350" y="180" width="200" height="120" rx="12" fill="rgba(0,200,100,0.15)" stroke="rgba(0,200,100,0.6)"/>
    <text x="450" y="210" fill="#00c864" font-size="18" text-anchor="middle" dominant-baseline="middle">PROJECT</text>
    <text x="450" y="230" fill="#00c864" font-size="12" text-anchor="middle" dominant-baseline="middle">id, developer_id, status, type, total_volume</text>
    <text x="450" y="250" fill="#00c864" font-size="12" text-anchor="middle" dominant-baseline="middle">verification_standard</text>
  </g>

  <!-- LISTING Card -->
  <g filter="url(#glass)">
    <rect x="600" y="180" width="200" height="100" rx="12" fill="rgba(0,150,255,0.15)" stroke="rgba(0,150,255,0.6)"/>
    <text x="700" y="210" fill="#0096ff" font-size="18" text-anchor="middle" dominant-baseline="middle">LISTING</text>
    <text x="700" y="230" fill="#0096ff" font-size="12" text-anchor="middle" dominant-baseline="middle">id, project_id, seller_id, price_per_ton, available_volume, status</text>
  </g>

  <!-- TRANSACTION Card -->
  <g filter="url(#glass)">
    <rect x="350" y="350" width="200" height="100" rx="12" fill="rgba(255,100,150,0.15)" stroke="rgba(255,100,150,0.6)"/>
    <text x="450" y="380" fill="#ff6496" font-size="18" text-anchor="middle" dominant-baseline="middle">TRANSACTION</text>
    <text x="450" y="400" fill="#ff6496" font-size="12" text-anchor="middle" dominant-baseline="middle">id, buyer_id, listing_id, amount_paid, volume_credits, timestamp</text>
  </g>

  <!-- Relationships -->
  <g stroke="#00ff99" stroke-width="2" marker-end="url(#arrow)">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L10,5 L0,10 Z" fill="#00ff99"/>
      </marker>
    </defs>
    <!-- ADMIN verifies USER -->
    <line x1="450" y1="110" x2="200" y2="180"/>
    <text x="320" y="150" fill="#00ff99" font-size="12" text-anchor="middle">verifies</text>
    <!-- ADMIN audits PROJECT -->
    <line x1="450" y1="110" x2="450" y2="180"/>
    <text x="460" y="150" fill="#00ff99" font-size="12" text-anchor="start">audits</text>
    <!-- ADMIN monitors TRANSACTION -->
    <line x1="450" y1="110" x2="450" y2="350"/>
    <text x="460" y="240" fill="#00ff99" font-size="12" text-anchor="start">monitors</text>
    <!-- USER develops PROJECT -->
    <line x1="200" y1="280" x2="350" y2="280"/>
    <text x="275" y="270" fill="#00ff99" font-size="12" text-anchor="middle">develops</text>
    <!-- USER posts LISTING -->
    <line x1="200" y1="280" x2="700" y2="280"/>
    <text x="450" y="270" fill="#00ff99" font-size="12" text-anchor="middle">posts</text>
    <!-- USER purchases TRANSACTION -->
    <line x1="200" y1="280" x2="450" y2="350"/>
    <text x="300" y="320" fill="#00ff99" font-size="12" text-anchor="middle">purchases</text>
    <!-- PROJECT backs LISTING -->
    <line x1="450" y1="300" x2="600" y2="280"/>
    <text x="525" y="295" fill="#00ff99" font-size="12" text-anchor="middle">source_of</text>
    <!-- LISTING fulfilled by TRANSACTION -->
    <line x1="700" y1="280" x2="450" y2="350"/>
    <text x="575" y="320" fill="#00ff99" font-size="12" text-anchor="middle">fulfills</text>
  </g>
</svg>
